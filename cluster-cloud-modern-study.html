    <style>

        --primary: #2563eb;
        --primary-dark: #1e40af;
        --primary-light: #dbeafe;
        --accent: #06b6d4;
        --accent-light: #cffafe;
        --success: #10b981;
        --success-light: #d1fae5;
        --warning: #f59e0b;
        --warning-light: #fef3c7;
        --danger: #ef4444;
        --danger-light: #fee2e2;
        --dark: #0f172a;
        --light: #f8fafc;
        --border: #e2e8f0;
        --text: #1e293b;
        --text-muted: #64748b;
        --body: "Inter", system-ui, sans-serif;
        --disp: "Space Grotesk", sans-serif;

      * {

        padding: 0;
        box-sizing: border-box;
      }
      html {
        -webkit-text-size-adjust: 100%;
      }
      body {

      .app {
        max-width: 1000px;
        margin: 0 auto;
      }
      .header {
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--accent) 100%
        );
        color: #fff;
        padding: 40px 30px;
        border-radius: 16px;
        margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(37, 99, 235, 0.15);
      }
      .header h1 {
        font-family: var(--disp);
        font-size: 32px;
        margin-bottom: 8px;
        font-weight: 700;
      }
      .header p {
        opacity: 0.95;
        font-size: 15px;
        max-width: 60ch;
      }

      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
        border-bottom: 2px solid var(--border);
        padding-bottom: 0;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .tab {
        padding: 12px 20px;
        border: none;
        background: none;
        font-family: var(--disp);
        font-weight: 600;
        font-size: 14px;
        color: var(--text-muted);
        cursor: pointer;
        border-bottom: 3px solid transparent;
        margin-bottom: -2px;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .tab:hover {
        color: var(--text);
      }
      .tab.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
      }

      .card {
        background: #fff;
        border-radius: 12px;
        padding: 28px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        border: 1px solid var(--border);
        transition: box-shadow 0.2s;
      }
      .card:hover {
        box-shadow: 0 4px 16px rgba(37, 99, 235, 0.1);
      }
      .card h2 {
        font-family: var(--disp);
        font-size: 20px;
        margin-bottom: 12px;
        color: var(--dark);
      }
      .card h3 {
        font-family: var(--disp);
        font-size: 16px;
        margin: 20px 0 10px;
        color: var(--primary);
      }
      .card p {
        line-height: 1.7;
        color: var(--text-muted);
        margin-bottom: 12px;
      }
      .card ul {
        margin: 12px 0 12px 24px;
        line-height: 1.8;
      }
      .card li {
        color: var(--text-muted);
        margin-bottom: 6px;
      }

      .analogy {
        background: linear-gradient(
          135deg,
          var(--success-light) 0%,
          #ecfdf5 100%
        );
        border-left: 4px solid var(--success);
        padding: 16px;
        border-radius: 8px;
        margin: 16px 0;
        font-size: 14px;
        line-height: 1.7;
      }
      .analogy strong {
        color: var(--success);
      }
      .analogy em {
        font-style: italic;
        color: #047857;

        font-weight: 600;
        color: var(--primary);
        font-family: var(--disp);
      }
      .concept-desc {
        color: var(--text-muted);
        line-height: 1.7;
      }

        display: inline-block;
        border-bottom: 2px dashed var(--border);
        padding: 2px 8px;
        min-width: 150px;
        font-weight: 500;
        color: var(--primary);
      }

      .scenario {
        background: var(--primary-light);
        border-left: 4px solid var(--primary);
        padding: 16px;
        border-radius: 8px;
        margin: 16px 0;
      }
      .scenario-prompt {
        font-weight: 600;
        color: var(--primary-dark);
        margin-bottom: 8px;
      }
      .scenario-text {
        color: var(--text-muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .option-group {
        margin: 20px 0;
      }
      .option-group label {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 12px 14px;
        background: var(--light);
        border: 1.5px solid var(--border);
        border-radius: 8px;
        margin-bottom: 8px;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 14px;
      }
      .option-group label:hover {
        background: #fff;
        border-color: var(--primary);
      }
      .option-group input[type="radio"] {
        margin-top: 3px;
        cursor: pointer;
        accent-color: var(--primary);
        flex-shrink: 0;
      }
      .option-group label.correct {
        background: var(--success-light);
        border-color: var(--success);
      }
      .option-group label.incorrect {
        background: var(--danger-light);
        border-color: var(--danger);
      }
      .option-group label:disabled {
        opacity: 0.6;
        cursor: default;
      }

      .button-row {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      .btn {
        padding: 11px 20px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 13.5px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: var(--disp);
      }
      .btn-primary {
        background: var(--primary);
        color: #fff;
      }
      .btn-primary:hover:not(:disabled) {
        background: var(--primary-dark);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .btn-secondary {
        background: var(--border);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-secondary:hover {
        background: var(--light);
        border-color: var(--primary);
      }

      .feedback {
        padding: 12px 14px;
        border-radius: 8px;
        margin-top: 12px;
        font-size: 13.5px;
        line-height: 1.6;
        display: none;

      .feedback.show {

      .feedback.correct {
        background: var(--success-light);

        color: #047857;
      }
      .feedback.incorrect {
        background: var(--danger-light);
        border-left: 3px solid var(--danger);
        color: #991b1b;
      }

      .progress {
        background: var(--border);
        height: 6px;
        border-radius: 3px;
        overflow: hidden;
        margin: 16px 0;
      }
      .progress-bar {
        background: linear-gradient(90deg, var(--primary), var(--accent));

        transition: width 0.3s;
      }

      .results {
        text-align: center;
        padding: 40px 20px;
      }
      .results-score {
        font-family: var(--disp);
        font-size: 52px;
        font-weight: 700;
        color: var(--primary);
        margin-bottom: 12px;
      }
      .results-text {
        color: var(--text-muted);
        font-size: 15px;
        margin-bottom: 24px;
        line-height: 1.6;
      }

      .stat-box {
        display: flex;
        gap: 12px;
        align-items: center;
        margin: 12px 0;
      }
      .stat-icon {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 18px;
        flex-shrink: 0;
      }
      .stat-icon.correct {
        background: var(--success-light);
        color: var(--success);
      }
      .stat-icon.incorrect {
        background: var(--danger-light);
        color: var(--danger);
      }
      .stat-icon.skipped {
        background: var(--warning-light);
        color: var(--warning);
      }
      .stat-label {
        font-weight: 600;
        color: var(--text);
      }
      .stat-value {
        color: var(--text-muted);
      }

      @media (max-width: 768px) {
        .header {
          padding: 24px;
          margin-bottom: 20px;
        }
        .header h1 {
          font-size: 24px;
        }
        .card {

        .tabs {

        }
        .tab {
          padding: 10px 14px;
          font-size: 12px;
        }
        .results-score {
          font-size: 40px;
        }
      }
    </style>
  </head>

<div class="card">
  <h2>Two types of scaling</h2>
  <div class="analogy"><strong>Vertical:</strong> <em>One person working faster. Buy a bigger processor, more RAM. Limits: physics (chips can only get so fast).</em></div>
  <div class="analogy"><strong>Horizontal:</strong> <em>Hire more people. Add more machines. Scales further but HARDER to program (coordination, synchronisation).</em></div>
</div>

<div class="card">
  <h2>Amdahl's Law: the serial fraction kills parallelism</h2>
  <p>Speed-up = 1 / (serial% + parallel%/cores)</p>
  <div class="scenario">
    <div class="scenario-prompt">Example:</div>
    <div class="scenario-text">A program is 5% serial, 95% parallel. With 100 cores: Speed-up = 1/(0.05 + 0.95/100) = 17×. No matter how many cores, max is 20× (1/0.05).</div>
  </div>
  <p><strong>Takeaway:</strong> Optimise the serial parts — they bottleneck everything.</p>
</div>

<div class="card">
  <h2>Gustafson-Barsis: scale the problem, not just processors</h2>
  <p>Don't keep problem size fixed. With more cores, solve a BIGGER problem.</p>
  <div class="analogy"><strong>Amdahl:</strong> <em>Fixed job, many workers — diminishing returns.</em></div>
  <div class="analogy"><strong>Gustafson:</strong> <em>More workers → bigger job → linear speed-up possible.</em></div>
</div>

<div class="card">
  <h2>Flynn's Taxonomy: hardware parallelism types</h2>
  <div class="concept-row">
    <div class="concept-label">SISD</div>
    <div class="concept-desc">Single Instruction Single Data — your laptop, one core</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">SIMD</div>
    <div class="concept-desc">Single Instruction Multiple Data — GPU: one operation on 1000 data points in parallel</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">MIMD</div>
    <div class="concept-desc">Multiple Instructions Multiple Data — multi-core CPU, cluster: each core does its own thing</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">MISD</div>
    <div class="concept-desc">Rare in practice; redundant processors for fault tolerance</div>
  </div>
</div>
`,

<div class="card">
  <h2>SPARTAN: supercomputer at UniMelb</h2>
  <p>A Linux-based HPC cluster optimised for tightly coupled parallel jobs (HPC), not independent job queueing (HTC).</p>
  <div class="concept-row">
    <div class="concept-label">Logon node</div>
    <div class="concept-desc">Where you SSH in. No compute runs here (shared by all users).</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">Worker nodes</div>
    <div class="concept-desc">Where jobs actually run. Allocated by SLURM.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">Storage</div>
    <div class="concept-desc">Shared parallel filesystem (GPFS). All nodes see the same /home and /data.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">SLURM</div>
    <div class="concept-desc">Job scheduler. You submit scripts with #SBATCH directives, SLURM allocates nodes.</div>
  </div>
</div>

<div class="card">
  <h2>MPI: distributed-memory parallel programming</h2>
  <p>Message Passing Interface. Each process has its own memory; data moves by explicit messages.</p>
  <div class="analogy"><strong>MPI_INIT:</strong> <em>All processes join the MPI world.</em></div>
  <div class="analogy"><strong>MPI_SEND/MPI_RECV:</strong> <em>Point-to-point messages between processes.</em></div>
  <div class="analogy"><strong>MPI_BCAST/MPI_REDUCE:</strong> <em>Collective operations: broadcast to all, gather results.</em></div>
  <p><strong>Key:</strong> Process 0 often orchestrates; other ranks do independent work, then sync at reduction.</p>
</div>

<div class="card">
  <h2>SLURM essentials</h2>
  <ul>
    <li><span class="fill-box">sbatch job.slurm</span> — submit a batch script</li>

    <li><span class="fill-box">sinfo</span> — show available partitions and node counts</li>
    <li><span class="fill-box">scancel 12345</span> — kill a job</li>
  </ul>
</div>
`,

<div class="card">
  <h2>VMs vs Containers: the tradeoff</h2>
  <div class="analogy"><strong>VMs:</strong> <em>Full houses. Each has its own kitchen, electricity, plumbing (guest OS). Isolated but HEAVY.</em></div>
  <div class="analogy"><strong>Containers:</strong> <em>Rooms in one house. Share the kitchen, electricity, OS kernel. LIGHT but less isolated.</em></div>
  <p><strong>Reality:</strong> Container = image + writable layer on a shared kernel. Can boot in ~1 second. VM boots in ~30 seconds (full OS startup).</p>

<div class="card">

  <h2>Why Kubernetes?</h2>
  <p>Manually running containers is chaos. K8s provides: scheduling, self-healing, scaling, rolling updates, declarative state.</p>
  <div class="analogy"><strong>Without K8s:</strong> <em>You manually ssh into servers and run 'docker run'. If a container crashes, you re-run it. If load spikes, you manuall add containers.</em></div>
  <div class="analogy"><strong>With K8s:</strong> <em>You declare "I want 5 replicas of this app". K8s keeps 5 running, replaces dead ones, scales on demand.</em></div>
</div>

<div class="card">
  <h2>K8s architecture</h2>
  <div class="concept-row">
    <div class="concept-label">Control Plane</div>
    <div class="concept-desc">The brain. API server, scheduler, controller-manager, etcd (database of state).</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">Worker Nodes</div>
    <div class="concept-desc">The muscle. Kubelet (agent) runs pods; kube-proxy (networking).</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">Pod</div>
    <div class="concept-desc">Smallest unit: one or more containers (usually one) sharing network/storage. EPHEMERAL — comes and goes.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">Deployment</div>
    <div class="concept-desc">Says "keep N replicas of this pod running". Handles rolling updates.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">Service</div>
    <div class="concept-desc">Stable virtual IP/DNS. Load-balances across pods that come and go.</div>
  </div>
</div>

<div class="card">
  <h2>Declarative vs Imperative</h2>
  <div class="analogy"><strong>Imperative (old):</strong> <em>"Run this container on that server. Now update it. Now scale it." You give commands.</em></div>
  <div class="analogy"><strong>Declarative (K8s):</strong> <em>"Here is a YAML describing desired state: 3 replicas, this image, this port. K8s makes reality match it."</em></div>
  <p>K8s continuously watches reality and reconciles it with the YAML. If a pod dies, K8s sees "want 3, have 2" and launches a new one.</p>
</div>
`,

<div class="card">

  <div class="analogy"><strong>Server-based:</strong> <em>Rent a server 24/7, pay monthly even if no traffic.</em></div>
  <div class="analogy"><strong>Serverless:</strong> <em>Pay per function invocation. No idle cost. Scales from 0 to thousands automatically.</em></div>

<div class="card">

<div class="card">

<div class="card">

<div class="card">
  <h2>The four Vs of Big Data</h2>
  <div class="concept-row">
    <div class="concept-label">Volume</div>
    <div class="concept-desc">Petabytes. Cannot fit on one machine. Need distributed storage (HDFS, S3, Swift).</div>

<div class="card">
  <h2>CAP Theorem: pick two</h2>
  <p>In a network partition, you CANNOT have all three. You must sacrifice one:</p>
  <div class="scenario">
    <div class="scenario-prompt">Consistency (C)</div>
    <div class="scenario-text">All nodes see the same data at the same time.</div>
  </div>
  <div class="scenario">

  </div>
  <div class="analogy"><strong>Real world:</strong> <em>Network partitions WILL happen. You choose CA (fail-stop, no partition) or AP (eventual consistency, partition-tolerant) or CP (consistent, accept unavailability).</em></div>
</div>

<div class="card">

  </div>
  <div class="concept-row">
    <div class="concept-label">AP</div>

  </div>
  <div class="concept-row">

</div>
`,

        {
          id: "security",
          title: "Cloud Security: the AAAs",
          learn: `
<div class="card">
  <h2>The four As of cloud security</h2>
  <div class="concept-row">

<div class="card">
  <h2>Operational security challenges</h2>
  <div class="analogy"><strong>Deletion:</strong> <em>In cloud, you don't own the physical disks. How do you securely delete data so it cannot be recovered? Cryptographic erasure is one answer.</em></div>
  <div class="analogy"><strong>Multi-tenancy:</strong> <em>Your VM and another organisation's VM run on the same physical server. Hypervisor isolation MUST be perfect.</em></div>

`,

      let currentTopic = 0,
        currentQ = 0,
        answers = new Array(100).fill(null),
        correct = 0,
        skipped = 0;

      function renderTabs() {
        const tabs = document.getElementById("tabsContainer");
        tabs.innerHTML = "";
        TOPICS.forEach((t, i) => {
          const btn = document.createElement("button");
          btn.className = "tab" + (i === currentTopic ? " active" : "");
          btn.textContent = t.title;
          btn.onclick = () => switchTopic(i);
          tabs.appendChild(btn);
        });
      }

      function switchTopic(i) {
        currentTopic = i;
        currentQ = 0;
        renderTabs();
        renderContent();
      }

      function renderContent() {
        const t = TOPICS[currentTopic];
        const content = document.getElementById("contentContainer");
        content.innerHTML = "";

        // Learn tab
        const learnDiv = document.createElement("div");
        learnDiv.innerHTML = t.learn;
        content.appendChild(learnDiv);

        // Quiz button
        const quizBtn = document.createElement("button");
        quizBtn.className = "btn btn-primary";
        quizBtn.style.marginTop = "30px";
        quizBtn.textContent = "Take Quiz: " + t.title;
        quizBtn.onclick = () => showQuiz();
        content.appendChild(quizBtn);
      }

      function showQuiz() {
        const t = TOPICS[currentTopic];
        const content = document.getElementById("contentContainer");
        content.innerHTML = "";

        const qIndex = currentQ;
        if (qIndex >= t.quiz.length) return showResults();

        const q = t.quiz[qIndex];
        const card = document.createElement("div");
        card.className = "card";

        const title = document.createElement("h2");
        title.textContent = "Question " + (qIndex + 1) + " of " + t.quiz.length;
        card.appendChild(title);

        const qText = document.createElement("p");
        qText.textContent = q.q;
        qText.style.fontSize = "16px";
        qText.style.marginBottom = "20px";
        card.appendChild(qText);

        const progress = document.createElement("div");
        progress.className = "progress";
        const pBar = document.createElement("div");
        pBar.className = "progress-bar";
        pBar.style.width = ((qIndex + 1) / t.quiz.length) * 100 + "%";
        progress.appendChild(pBar);
        card.appendChild(progress);

        const optDiv = document.createElement("div");
        optDiv.className = "option-group";
        q.o.forEach((opt, i) => {
          const label = document.createElement("label");
          const input = document.createElement("input");
          input.type = "radio";
          input.name = "ans";
          input.value = i;
          input.checked = answers[qIndex] === i;
          label.appendChild(input);
          label.appendChild(document.createTextNode(opt));
          optDiv.appendChild(label);
        });
        card.appendChild(optDiv);

        const btnDiv = document.createElement("div");
        btnDiv.className = "button-row";

        const submitBtn = document.createElement("button");
        submitBtn.className = "btn btn-primary";
        submitBtn.textContent = "Submit";
        submitBtn.onclick = () => submitQ(q);
        btnDiv.appendChild(submitBtn);

        const skipBtn = document.createElement("button");
        skipBtn.className = "btn btn-secondary";
        skipBtn.textContent = "Skip";
        skipBtn.onclick = () => {
          answers[qIndex] = -1;
          currentQ++;
          showQuiz();
        };
        btnDiv.appendChild(skipBtn);

        card.appendChild(btnDiv);
        content.appendChild(card);
      }

      function submitQ(q) {
        const checked = document.querySelector('input[name="ans"]:checked');
        if (!checked) {
          alert("Pick an answer");
          return;
        }

        const ans = parseInt(checked.value);
        answers[currentQ] = ans;
        if (ans === q.a) correct++;

        // Show feedback
        const labels = [...document.querySelectorAll(".option-group label")];
        labels.forEach((l) => (l.disabled = true));
        labels[ans].classList.add(ans === q.a ? "correct" : "incorrect");
        if (ans !== q.a) labels[q.a].classList.add("correct");

        const feedback = document.createElement("div");
        feedback.className =
          "feedback show " + (ans === q.a ? "correct" : "incorrect");
        feedback.innerHTML =
          (ans === q.a ? "✓ Correct" : "✗ Incorrect") +
          ". The correct answer is: <strong>" +
          q.o[q.a] +
          "</strong>";
        document.querySelector(".button-row").replaceWith(feedback);

        const nextBtn = document.createElement("button");
        nextBtn.className = "btn btn-primary";
        nextBtn.textContent = "Next";
        nextBtn.onclick = () => {
          currentQ++;
          showQuiz();
        };
        feedback.parentNode.appendChild(nextBtn);
      }

      function showResults() {
        const t = TOPICS[currentTopic];
        const attempted = t.quiz.length - skipped;
        const pct = attempted > 0 ? Math.round((correct / attempted) * 100) : 0;

        const content = document.getElementById("contentContainer");
        content.innerHTML =
          '<div class="results"><div class="results-score">' +
          pct +
          '%</div><div class="results-text">Quiz complete</div></div>';
      }

      renderTabs();
      renderContent();
    </script>
  </body>
