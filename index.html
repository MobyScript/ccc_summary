<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cluster &amp; Cloud Computing Study Tool</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #2563eb;
        --primary-dark: #1e40af;
        --primary-light: #dbeafe;
        --accent: #06b6d4;
        --accent-light: #cffafe;
        --success: #10b981;
        --success-light: #d1fae5;
        --warning: #f59e0b;
        --warning-light: #fef3c7;
        --danger: #ef4444;
        --danger-light: #fee2e2;
        --dark: #0f172a;
        --light: #f8fafc;
        --border: #e2e8f0;
        --text: #1e293b;
        --text-muted: #64748b;
        --body: "Inter", system-ui, sans-serif;
        --disp: "Space Grotesk", sans-serif;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        -webkit-text-size-adjust: 100%;
      }
      body {
        font-family: var(--body);
        color: var(--text);
        background: linear-gradient(135deg, #f0f4f8 0%, #e1eef9 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .app {
        max-width: 1000px;
        margin: 0 auto;
      }
      .header {
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--accent) 100%
        );
        color: #fff;
        padding: 40px 30px;
        border-radius: 16px;
        margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(37, 99, 235, 0.15);
      }
      .header h1 {
        font-family: var(--disp);
        font-size: 32px;
        margin-bottom: 8px;
        font-weight: 700;
      }
      .header p {
        opacity: 0.95;
        font-size: 15px;
        max-width: 60ch;
      }

      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
        border-bottom: 2px solid var(--border);
        padding-bottom: 0;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .tab {
        padding: 12px 20px;
        border: none;
        background: none;
        font-family: var(--disp);
        font-weight: 600;
        font-size: 14px;
        color: var(--text-muted);
        cursor: pointer;
        border-bottom: 3px solid transparent;
        margin-bottom: -2px;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .tab:hover {
        color: var(--text);
      }
      .tab.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
      }

      .card {
        background: #fff;
        border-radius: 12px;
        padding: 28px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        border: 1px solid var(--border);
        transition: box-shadow 0.2s;
      }
      .card:hover {
        box-shadow: 0 4px 16px rgba(37, 99, 235, 0.1);
      }
      .card h2 {
        font-family: var(--disp);
        font-size: 20px;
        margin-bottom: 12px;
        color: var(--dark);
      }
      .card h3 {
        font-family: var(--disp);
        font-size: 16px;
        margin: 20px 0 10px;
        color: var(--primary);
      }
      .card p {
        line-height: 1.7;
        color: var(--text-muted);
        margin-bottom: 12px;
      }
      .card ul {
        margin: 12px 0 12px 24px;
        line-height: 1.8;
      }
      .card li {
        color: var(--text-muted);
        margin-bottom: 6px;
      }

      .analogy {
        background: linear-gradient(
          135deg,
          var(--success-light) 0%,
          #ecfdf5 100%
        );
        border-left: 4px solid var(--success);
        padding: 16px;
        border-radius: 8px;
        margin: 16px 0;
        font-size: 14px;
        line-height: 1.7;
      }
      .analogy strong {
        color: var(--success);
      }
      .analogy em {
        font-style: italic;
        color: #047857;
      }

      .concept-row {
        display: grid;
        grid-template-columns: 200px 1fr;
        gap: 20px;
        margin: 16px 0;
        align-items: start;
      }
      .concept-label {
        font-weight: 600;
        color: var(--primary);
        font-family: var(--disp);
      }
      .concept-desc {
        color: var(--text-muted);
        line-height: 1.7;
      }

      .fill-box {
        display: inline-block;
        border-bottom: 2px dashed var(--border);
        padding: 2px 8px;
        min-width: 150px;
        font-weight: 500;
        color: var(--primary);
      }

      .scenario {
        background: var(--primary-light);
        border-left: 4px solid var(--primary);
        padding: 16px;
        border-radius: 8px;
        margin: 16px 0;
      }
      .scenario-prompt {
        font-weight: 600;
        color: var(--primary-dark);
        margin-bottom: 8px;
      }
      .scenario-text {
        color: var(--text-muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .formula {
        background: var(--dark);
        color: #e2e8f0;
        font-family: "SFMono-Regular", Consolas, monospace;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 14px;
        margin: 12px 0;
        overflow-x: auto;
      }

      .qtype {
        display: inline-block;
        font-family: var(--disp);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 4px 10px;
        border-radius: 999px;
        margin-bottom: 14px;
      }
      .qtype.single {
        background: var(--primary-light);
        color: var(--primary-dark);
      }
      .qtype.multi {
        background: var(--warning-light);
        color: #92400e;
      }

      .option-group {
        margin: 20px 0;
      }
      .option-group label {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 12px 14px;
        background: var(--light);
        border: 1.5px solid var(--border);
        border-radius: 8px;
        margin-bottom: 8px;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 14px;
        line-height: 1.5;
      }
      .option-group label:hover {
        background: #fff;
        border-color: var(--primary);
      }
      .option-group input[type="radio"],
      .option-group input[type="checkbox"] {
        margin-top: 3px;
        cursor: pointer;
        accent-color: var(--primary);
        flex-shrink: 0;
        width: 16px;
        height: 16px;
      }
      .option-group label.correct {
        background: var(--success-light);
        border-color: var(--success);
      }
      .option-group label.incorrect {
        background: var(--danger-light);
        border-color: var(--danger);
      }
      .option-group label.locked {
        cursor: default;
        pointer-events: none;
      }

      /* Cover the answers until the user uncovers them to answer */
      .cover-toggle {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        font-family: var(--disp);
        font-size: 13px;
        font-weight: 600;
        color: var(--primary-dark);
        background: var(--primary-light);
        border: 1.5px solid var(--primary);
        border-radius: 8px;
        padding: 9px 14px;
        margin: 18px 0 4px;
        cursor: pointer;
        user-select: none;
      }
      .cover-toggle input {
        width: 16px;
        height: 16px;
        accent-color: var(--primary);
        cursor: pointer;
      }
      .opt-shell {
        position: relative;
        margin: 12px 0 4px;
      }
      .opt-list {
        transition: filter 0.2s;
      }
      .opt-shell.covered .opt-list {
        filter: blur(7px);
        pointer-events: none;
        user-select: none;
      }
      .cover-veil {
        display: none;
        position: absolute;
        inset: 0;
        align-items: center;
        justify-content: center;
        text-align: center;
        border: 1.5px dashed var(--primary);
        border-radius: 10px;
        background: rgba(219, 234, 254, 0.55);
        font-family: var(--disp);
        font-weight: 600;
        font-size: 14px;
        color: var(--primary-dark);
        padding: 16px;
        z-index: 2;
      }
      .opt-shell.covered .cover-veil {
        display: flex;
      }

      /* Longer answer exam style question */
      .la-part {
        margin: 20px 0;
        padding-top: 16px;
        border-top: 1px dashed var(--border);
      }
      .la-part:first-of-type {
        border-top: none;
        padding-top: 0;
      }
      .la-prompt {
        color: var(--text);
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 14.5px;
      }
      .la-marks {
        color: var(--text-muted);
        font-weight: 600;
        font-family: var(--disp);
        font-size: 12px;
        white-space: nowrap;
      }
      .la-answer {
        background: var(--success-light);
        border-left: 3px solid var(--success);
        border-radius: 8px;
        padding: 14px 16px;
        color: #047857;
        line-height: 1.7;
        font-size: 13.5px;
      }
      .la-answer strong {
        color: #065f46;
      }
      .la-answer ul {
        margin: 8px 0 0 18px;
        line-height: 1.7;
      }
      .la-answer li {
        margin-bottom: 5px;
      }

      .button-row {
        display: flex;
        gap: 10px;
        margin-top: 20px;
        flex-wrap: wrap;
      }
      .btn {
        padding: 11px 20px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 13.5px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: var(--disp);
      }
      .btn-primary {
        background: var(--primary);
        color: #fff;
      }
      .btn-primary:hover:not(:disabled) {
        background: var(--primary-dark);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .btn-secondary {
        background: var(--border);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-secondary:hover {
        background: var(--light);
        border-color: var(--primary);
      }

      .feedback {
        padding: 14px 16px;
        border-radius: 8px;
        margin-top: 16px;
        font-size: 13.5px;
        line-height: 1.65;
        display: none;
      }
      .feedback.show {
        display: block;
      }
      .feedback.correct {
        background: var(--success-light);
        border-left: 3px solid var(--success);
        color: #047857;
      }
      .feedback.incorrect {
        background: var(--danger-light);
        border-left: 3px solid var(--danger);
        color: #991b1b;
      }
      .feedback .explain {
        display: block;
        margin-top: 8px;
        color: var(--text);
        font-weight: 400;
      }

      .progress {
        background: var(--border);
        height: 6px;
        border-radius: 3px;
        overflow: hidden;
        margin: 16px 0;
      }
      .progress-bar {
        background: linear-gradient(90deg, var(--primary), var(--accent));
        height: 100%;
        transition: width 0.3s;
      }

      .results {
        text-align: center;
        padding: 40px 20px;
      }
      .results-score {
        font-family: var(--disp);
        font-size: 52px;
        font-weight: 700;
        color: var(--primary);
        margin-bottom: 12px;
      }
      .results-text {
        color: var(--text-muted);
        font-size: 15px;
        margin-bottom: 24px;
        line-height: 1.6;
      }

      .stat-box {
        display: flex;
        gap: 12px;
        align-items: center;
        margin: 12px auto;
        max-width: 360px;
        text-align: left;
      }
      .stat-icon {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 18px;
        flex-shrink: 0;
      }
      .stat-icon.correct {
        background: var(--success-light);
        color: var(--success);
      }
      .stat-icon.incorrect {
        background: var(--danger-light);
        color: var(--danger);
      }
      .stat-icon.skipped {
        background: var(--warning-light);
        color: var(--warning);
      }
      .stat-label {
        font-weight: 600;
        color: var(--text);
      }
      .stat-value {
        color: var(--text-muted);
      }

      @media (max-width: 768px) {
        .header {
          padding: 24px;
          margin-bottom: 20px;
        }
        .header h1 {
          font-size: 24px;
        }
        .card {
          padding: 20px;
        }
        .concept-row {
          grid-template-columns: 1fr;
          gap: 8px;
        }
        .tabs {
          gap: 4px;
          padding-bottom: 8px;
        }
        .tab {
          padding: 10px 14px;
          font-size: 12px;
        }
        .results-score {
          font-size: 40px;
        }
      }
    </style>
  </head>

<div class="card">
  <h2>Two ways to make a system bigger</h2>
  <div class="analogy"><strong>Vertical (scale up):</strong> <em>One worker doing the job faster. Buy a bigger processor, more cores, more RAM, faster storage. Simple to program because the code stays single machine, but it hits a wall: physics limits clock speed, a single box has a maximum socket and memory count, and the price climbs steeply at the top end.</em></div>
  <div class="analogy"><strong>Horizontal (scale out):</strong> <em>Hire more workers. Add more machines and split the work across them. Scales almost without limit and uses cheap commodity nodes, but it is much harder to program: you now have to coordinate processes, synchronise shared state, tolerate partial failures, and pay for network communication.</em></div>
  <p>The exam framing: vertical is limited but easy, horizontal is powerful but introduces the hard distributed systems problems (coordination, consistency, fault tolerance).</p>
</div>

<div class="card">
  <h2>Amdahl's Law: the serial fraction is the ceiling</h2>
  <p>If a fraction <em>s</em> of a program must run serially and the rest can be parallelised across <em>N</em> processors, the speed up is bounded.</p>
  <div class="formula">Speedup = 1 / ( s + (1 - s) / N )</div>
  <div class="scenario">
    <div class="scenario-prompt">Worked example</div>
    <div class="scenario-text">A program is 5% serial and 95% parallel. With 100 cores the speedup is 1 / (0.05 + 0.95/100) which is about 16.8 times. As N goes to infinity the speedup approaches 1 / 0.05 which is 20 times. Buying more than a few dozen cores barely helps.</div>
  </div>
  <p><strong>Takeaway:</strong> the serial portion dominates at scale, so the best return often comes from shrinking the serial fraction rather than adding hardware. Amdahl assumes a <em>fixed problem size</em>.</p>
</div>

<div class="card">
  <h2>Gustafson and Barsis: scale the problem, not just the processors</h2>
  <p>Gustafson observed that in practice we do not keep the problem fixed. Given more processors, scientists solve a bigger problem in the same time, and the parallel part grows with the problem while the serial setup stays roughly constant.</p>
  <div class="analogy"><strong>Amdahl view:</strong> <em>Fixed job, more workers, diminishing returns (strong scaling).</em></div>
  <div class="analogy"><strong>Gustafson view:</strong> <em>More workers, proportionally bigger job, near linear speedup is achievable (weak scaling).</em></div>
  <p>Strong scaling holds the total work fixed and adds processors. Weak scaling grows the work in step with the processor count so the work per processor stays constant.</p>
</div>

<div class="card">
  <h2>Flynn's Taxonomy: classifying hardware parallelism</h2>
  <div class="concept-row">
    <div class="concept-label">SISD</div>
    <div class="concept-desc">Single Instruction Single Data. One instruction stream over one data stream, the classic single core sequential machine.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">SIMD</div>
    <div class="concept-desc">Single Instruction Multiple Data. One operation applied to many data elements at once. GPUs and vector units are the textbook example, ideal for data parallel maths.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">MIMD</div>
    <div class="concept-desc">Multiple Instruction Multiple Data. Each processor runs its own instruction stream on its own data. Multi core CPUs and clusters fall here.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">MISD</div>
    <div class="concept-desc">Multiple Instruction Single Data. Rare. Mainly used for redundancy and fault tolerance, for example flight control systems voting on the same input.</div>
  </div>
</div>

<div class="card">
  <h2>Performance vocabulary</h2>
  <ul>
    <li><strong>Latency:</strong> time to complete one task.</li>
    <li><strong>Throughput:</strong> number of tasks completed per unit time.</li>
    <li><strong>Speedup:</strong> time on one processor divided by time on N processors.</li>
    <li><strong>Efficiency:</strong> speedup divided by N, how well you use each processor.</li>
  </ul>
  <p>Adding processors usually lowers efficiency because of communication and synchronisation overhead, which is exactly what Amdahl captures.</p>
</div>
`,

<div class="card">
  <h2>SPARTAN: the University of Melbourne HPC cluster</h2>
  <p>SPARTAN is a Linux based High Performance Computing cluster. HPC targets tightly coupled parallel jobs that communicate heavily, in contrast to High Throughput Computing (HTC) which runs many independent jobs that rarely talk to each other.</p>
  <div class="concept-row">
    <div class="concept-label">Login node</div>
    <div class="concept-desc">Where you SSH in to edit files and submit jobs. It is shared by everyone, so you must not run heavy compute here.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">Worker nodes</div>
    <div class="concept-desc">Where jobs actually execute. The scheduler allocates them to your job for its lifetime.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">Shared filesystem</div>
    <div class="concept-desc">A parallel filesystem visible from every node, so all nodes see the same home and data directories with no manual copying.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">SLURM</div>
    <div class="concept-desc">The batch job scheduler. You submit a script with SBATCH directives and SLURM queues it, allocates resources, and runs it.</div>
  </div>
</div>

<div class="card">
  <h2>SLURM: what a job script declares</h2>
  <p>A SLURM script is a normal shell script with SBATCH directives at the top. Those directives request resources from the scheduler.</p>
  <ul>
    <li>Select a partition (a named pool of nodes).</li>
    <li>Request the number of nodes, tasks, and CPUs per task.</li>
    <li>Set a walltime limit (the maximum time the job may run).</li>
    <li>Request memory and, if needed, GPUs.</li>
    <li>Name output and error files, then run the actual commands.</li>
  </ul>
  <p>A SLURM script does not install software through sudo and does not give you interactive root on the cluster. It requests resources and launches work.</p>
</div>

<div class="card">
  <h2>SLURM commands you must know</h2>
  <ul>
    <li><span class="fill-box">sbatch job.slurm</span> submit a batch script to the queue.</li>
    <li><span class="fill-box">squeue -u $USER</span> list your jobs. PD means pending, R means running, CG means completing.</li>
    <li><span class="fill-box">sinfo</span> show partitions and node availability.</li>
    <li><span class="fill-box">scancel 12345</span> cancel a queued or running job by id.</li>
    <li><span class="fill-box">srun</span> launch a job step, often used to start parallel tasks within an allocation.</li>
  </ul>
</div>

<div class="card">
  <h2>MPI: distributed memory parallel programming</h2>
  <p>Message Passing Interface is the standard for programming across nodes that do not share memory. Each process has private memory and a unique rank, and data moves only through explicit messages.</p>
  <div class="concept-row">
    <div class="concept-label">MPI_Init</div>
    <div class="concept-desc">Starts the MPI environment so processes can communicate. MPI_Finalize shuts it down.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">MPI_Comm_size</div>
    <div class="concept-desc">Returns how many processes are in the communicator.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">MPI_Comm_rank</div>
    <div class="concept-desc">Returns the calling process's own id within the communicator, so each process knows which slice of work is its own.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">MPI_Send / MPI_Recv</div>
    <div class="concept-desc">Point to point messages between two named processes.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">MPI_Bcast / MPI_Scatter / MPI_Gather / MPI_Reduce</div>
    <div class="concept-desc">Collective operations across all processes: broadcast one value to all, scatter pieces of an array, gather pieces back, or reduce many values into one (for example a global sum).</div>
  </div>
  <p>Note that Init, Rank, Size, Scatter, and Reduce are MPI calls. There is no MPI function literally called Collect.</p>
</div>

<div class="card">
  <h2>The three cloud service models</h2>
  <p>The models differ by how much the provider manages versus how much you manage.</p>
  <div class="scenario">
    <div class="scenario-prompt">IaaS (Infrastructure as a Service)</div>
    <div class="scenario-text">You manage the operating system and everything above it. The provider runs the virtualisation, physical servers, storage, and networking. Examples: AWS EC2, the Melbourne Research Cloud, and OpenStack.</div>
  </div>
  <div class="scenario">
    <div class="scenario-prompt">PaaS (Platform as a Service)</div>
    <div class="scenario-text">You manage only your code and data. The provider runs the runtime, middleware, operating system, and everything below. Examples: Heroku and Google App Engine.</div>
  </div>
  <div class="scenario">
    <div class="scenario-prompt">SaaS (Software as a Service)</div>
    <div class="scenario-text">Everything is managed for you. You simply use the application. Examples: Gmail, Office 365, and Canvas.</div>
  </div>
</div>

<div class="card">
  <h2>OpenStack: open source IaaS</h2>
  <p>OpenStack is an open source platform for building IaaS clouds. The Melbourne Research Cloud (MRC) runs on it. It is made of cooperating services, each with its own job.</p>
  <div class="concept-row">
    <div class="concept-label">Nova</div>
    <div class="concept-desc">Compute. Launches and manages virtual machine instances.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">Neutron</div>

  </div>
  <div class="concept-row">
    <div class="concept-label">Cinder</div>
    <div class="concept-desc">Block storage. Persistent volumes that attach to instances like virtual disks.</div>

  <div class="concept-row">
    <div class="concept-label">Swift</div>
    <div class="concept-desc">Object storage. Buckets of objects accessed over HTTP, comparable to AWS S3.</div>

  <div class="concept-row">
    <div class="concept-label">Keystone</div>

  <div class="analogy"><strong>SSH keys matter:</strong> <em>Best practice is key based SSH rather than passwords. The private key stays securely with you and must never be emailed or shared through cloud storage. To reach an instance you present your private key, and the matching public key sits on the server.</em></div>

</div>

<div class="card">
  <h2>Virtual machines versus containers</h2>
  <div class="analogy"><strong>Virtual machines:</strong> <em>Separate houses. Each VM runs a full guest operating system on top of a hypervisor, with its own kernel, drivers, and services. Strong isolation, but heavy: large images and slow boot because a whole OS starts up.</em></div>
  <div class="analogy"><strong>Containers:</strong> <em>Rooms in one shared house. Containers share the host operating system kernel and isolate processes using namespaces and control groups. Lightweight and fast to start, but isolation is weaker than a full VM.</em></div>
  <p><strong>Reality check:</strong> a container is an image plus a thin writable layer running on a shared kernel, so it can start in roughly a second. A VM commonly takes tens of seconds because it boots an entire guest OS.</p>
</div>

<div class="card">
  <h2>Bare metal versus hosted hypervisors</h2>
  <p>A type 1 (bare metal) hypervisor runs directly on hardware. A type 2 (hosted) hypervisor runs as an application on top of a host operating system.</p>
  <ul>
    <li>Bare metal generally gives better performance because there is no host OS layer in the way.</li>
    <li>Bare metal can be more secure because the attack surface of a general purpose host OS is removed.</li>
    <li>Hosted hypervisors are easier to set up on an existing desktop and convenient for development.</li>
  </ul>
</div>

    <div class="concept-label">Container</div>

  </div>
  <div class="concept-row">
    <div class="concept-label">Dockerfile</div>
    <div class="concept-desc">The recipe for an image. Each instruction such as FROM, COPY, or RUN creates a layer.</div>

<div class="card">
  <h2>Why orchestration is needed</h2>
  <p>Running containers by hand across many machines is unmanageable. Kubernetes adds scheduling, self healing, scaling, rolling updates, service discovery, and a declarative model of desired state.</p>

  <div class="analogy"><strong>With Kubernetes:</strong> <em>You declare that you want five replicas of an app. Kubernetes keeps five running, replaces failures, and can scale on demand.</em></div>

  <div class="concept-row">
    <div class="concept-label">Control plane</div>

  </div>
  <div class="concept-row">
    <div class="concept-label">Worker nodes</div>
    <div class="concept-desc">The muscle. The kubelet agent runs pods on the node and kube proxy handles pod networking.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">Pod</div>

<div class="card">
  <h2>What Function as a Service means</h2>
  <p>With FaaS you write a function and upload it, and the platform runs it on demand. There are still servers underneath, but you do not provision or manage them. You are billed for actual execution, scaling automatically from zero to many concurrent instances.</p>
  <div class="analogy"><strong>Server based:</strong> <em>You rent a server that runs around the clock and pay even when it is idle.</em></div>
  <div class="analogy"><strong>Serverless:</strong> <em>You pay per invocation with no idle cost, and the platform scales from zero to thousands as load arrives.</em></div>
</div>

<div class="card">
  <h2>Platforms</h2>
  <div class="concept-row">
    <div class="concept-label">AWS Lambda</div>
    <div class="concept-desc">A commercial FaaS triggered by events such as object uploads, API Gateway requests, or queue messages. Scales automatically.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">Fission</div>
    <div class="concept-desc">Open source FaaS that runs on Kubernetes. It keeps a warm pool of pre started environments for low latency.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">OpenWhisk</div>
    <div class="concept-desc">Apache's open source, event driven FaaS platform.</div>
  </div>
</div>

<div class="card">
  <h2>The cold start problem</h2>
  <p>The first invocation of an idle function is slow because the platform must start a runtime, load the code, and only then execute. Later calls can reuse a warm instance and run quickly. Fission reduces cold starts by keeping a pool of pre warmed environments ready to accept code.</p>

<div class="card">

</div>

  <div class="analogy"><strong>Poor fit:</strong> <em>Steady high traffic that is cheaper on an always on service, long running jobs, and workloads needing heavy local state, since functions are short lived and stateless.</em></div>
</div>

<div class="card">
  <h2>The four Vs of big data</h2>
  <div class="concept-row">
    <div class="concept-label">Volume</div>
    <div class="concept-desc">The sheer amount of data, often too large for one machine, needing distributed storage such as HDFS, S3, or Swift.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">Velocity</div>
    <div class="concept-desc">The speed at which data arrives, including real time streams handled by tools like Kafka, Flink, or Spark Streaming.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">Variety</div>
    <div class="concept-desc">The many formats, structured, semi structured, and unstructured, that require extract, transform, load processing.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">Veracity</div>
    <div class="concept-desc">The trustworthiness and quality of data, including errors, duplicates, and missing values that must be cleaned.</div>
  </div>
</div>

<div class="card">
  <h2>CAP Theorem: choose two under partition</h2>
  <p>In a distributed system you cannot fully guarantee all three properties at once when the network can fail.</p>
  <div class="scenario">
    <div class="scenario-prompt">Consistency (C)</div>
    <div class="scenario-text">Every read sees the most recent write, so all nodes agree on the data.</div>
  </div>
  <div class="scenario">
    <div class="scenario-prompt">Availability (A)</div>
    <div class="scenario-text">Every request gets a non error response, even if some nodes are down.</div>
  </div>
  <div class="scenario">
    <div class="scenario-prompt">Partition tolerance (P)</div>
    <div class="scenario-text">The system keeps working when the network splits and nodes cannot all reach each other.</div>
  </div>
  <div class="analogy"><strong>Reality:</strong> <em>Network partitions will happen, so P is effectively mandatory for a distributed store. The real choice during a partition is between consistency (CP) and availability (AP).</em></div>
</div>

<div class="card">
  <h2>Where real systems land</h2>
  <div class="concept-row">
    <div class="concept-label">CA</div>
    <div class="concept-desc">Traditional single node relational databases. Consistent and available, but they assume no partition.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">AP</div>
    <div class="concept-desc">DynamoDB, Cassandra, CouchDB. Stay available during a partition and become eventually consistent.</div>
  </div>
  <div class="concept-row">
    <div class="concept-label">CP</div>
    <div class="concept-desc">Systems like Zookeeper and distributed locks. Reject some requests during a partition to preserve consistency.</div>
  </div>
</div>

<div class="card">
  <h2>Search engines: ElasticSearch</h2>
  <p>ElasticSearch is a distributed search and analytics engine built on inverted indexes, not a relational database. It is excellent at full text search and aggregations over large document sets.</p>
  <p>It is not designed for arbitrary many to many joins the way a relational database is. It can emulate some joins through lookup indexes, but with limitations, for example on the size of the lookup index. The honest answer to whether it can do many to many joins is yes through lookup indexes, but with limitations.</p>
</div>
`,

  <p>Authentication establishes identity, and authorisation grants permissions. They are distinct: you can be authenticated yet not authorised for a given action.</p>

<div class="card">
  <h2>What authentication actually proves</h2>
  <p>Authentication is the act of proving your identity. A password, a fingerprint, or face recognition are factors used to do that, grouped as something you know, something you have, and something you are. Combining factors gives multi factor authentication, which is far stronger than any single factor.</p>
</div>

<div class="card">
  <h2>Operational security challenges in the cloud</h2>
  <div class="analogy"><strong>Secure deletion:</strong> <em>You do not own the physical disks, so guaranteeing data is unrecoverable is hard. Cryptographic erasure, destroying the encryption keys, is one practical answer.</em></div>
  <div class="analogy"><strong>Multi tenancy:</strong> <em>Your virtual machine can share a physical host with another organisation's, so hypervisor isolation must hold. A hypervisor escape that lets one tenant read another's memory is a severe risk.</em></div>
  <div class="analogy"><strong>Single sign on complexity:</strong> <em>Federation such as Shibboleth or the Australian Access Federation lets staff use one identity across services, which is convenient but adds trust and configuration complexity.</em></div>
  <div class="analogy"><strong>Legal and jurisdictional risk:</strong> <em>Data may be stored across borders, raising data sovereignty, GDPR, and contractual liability concerns.</em></div>
</div>

              parts: [
                {

                },
                {

                  marks: "1 mark",

                },
                {
                  label: "C)",

                {
                  label: "D)",
                  prompt: "The University wishes to showcase your team's solution to all current and future COMP90024 students by introducing a new federated attribute (eduCOMP90024) into the University Identity Provider and releasing it across the Australian Access Federation. Discuss the technical and non technical challenges of rolling out this attribute.",

                  answer: "<strong>Non technical challenges:</strong><ul><li>The attribute definition has to be agreed across the whole federation, not just within one university.</li><li>Deciding who actually counts as a current or future student, and who curates and maintains that list over time.</li><li>Is it worth federating an attribute for just one small service? Governance, ownership, and ongoing support cost effort.</li><li>Lifecycle and privacy: revoking or expiring the attribute once students leave, and avoiding over sharing identity information.</li></ul><strong>Technical challenges:</strong><ul><li>The University Identity Provider must know how and when to release this attribute, and ideally only to this service rather than the entire federation.</li><li>The service must be a recognised AAF service provider with an allocated certificate so the federation trusts it.</li><li>The attribute has to be mapped into the application's authorisation logic, which must be extended to consume and act on it.</li><li>Ongoing maintenance and support after the showcase, including handling students who have finished the subject.</li></ul>",
                },
                {
                  label: "E)",
                  prompt: "Why would your team's small Cloud solution not itself be a suitable use case for the eduPerson attributes that Shibboleth uses to support single sign on through the AAF?",
                  marks: "3 marks",
                  answer: "<ul><li>It serves only a tiny subset of users (one team plus one staff member), so the cost and complexity of joining the federation far outweighs the benefit.</li><li>Becoming an AAF recognised service provider needs an allocated certificate, attribute release agreements, and ongoing maintenance, which is disproportionate for a short lived assignment service.</li><li>eduPerson attributes are general, federation wide identity attributes; they are not designed to gate one small, niche resource, and the IdP would have to be told to release them to just this service.</li></ul>",
                },
                {
                  label: "F)",
                  prompt: "A team member signs in to your web front end through the AAF on a public library PC and forgets to log out. A rival student then sits down at that PC and finds the live session. Describe a worst case scenario for your team.",
                  marks: "2 marks",
                  answer: "Because of single sign on, the rival inherits the team member's already authenticated session without needing any username or password. In the worst case they act as the team: reading or exfiltrating the data and then deleting the instances, the ElasticSearch database, and the entire application through the live SSO session, destroying the assignment work.",

      let currentTopic = 0,
        currentQ = 0,
        results = [];

      function renderTabs() {
        const tabs = document.getElementById("tabsContainer");
        tabs.innerHTML = "";
        TOPICS.forEach((t, i) => {
          const btn = document.createElement("button");
          btn.className = "tab" + (i === currentTopic ? " active" : "");
          btn.textContent = t.title;
          btn.onclick = () => switchTopic(i);
          tabs.appendChild(btn);
        });
      }

      function switchTopic(i) {
        currentTopic = i;
        currentQ = 0;
        results = [];
        renderTabs();
        renderContent();
      }

      function renderContent() {
        const t = TOPICS[currentTopic];
        const content = document.getElementById("contentContainer");
        content.innerHTML = "";

        const learnDiv = document.createElement("div");
        learnDiv.innerHTML = t.learn;
        content.appendChild(learnDiv);

        const quizBtn = document.createElement("button");
        quizBtn.className = "btn btn-primary";
        quizBtn.style.marginTop = "30px";
        quizBtn.textContent = "Take Quiz: " + t.title;
        quizBtn.onclick = () => startQuiz();
        content.appendChild(quizBtn);
      }

      function startQuiz() {
        currentQ = 0;
        results = [];
        showQuiz();
      }

      function isMulti(q) {
        // Every question is answered with checkboxes now: a question may have
        // one or more correct options, and you are never told how many.
        return true;
      }

      function correctSet(q) {
        return Array.isArray(q.a) ? q.a.slice() : [q.a];
      }

      function showQuiz() {
        const t = TOPICS[currentTopic];
        const content = document.getElementById("contentContainer");
        content.innerHTML = "";

        const qIndex = currentQ;
        if (qIndex >= t.quiz.length) return showResults();

        const q = t.quiz[qIndex];
        if (q.type === "long") return showLongQuestion(q, qIndex, t);
        const multi = isMulti(q);

        const card = document.createElement("div");
        card.className = "card";

        const badge = document.createElement("span");
        badge.className = "qtype multi";
        badge.textContent =
          "Multiple choice. Select all correct answers (one or more)";
        card.appendChild(badge);

        const title = document.createElement("h2");
        title.textContent = "Question " + (qIndex + 1) + " of " + t.quiz.length;
        card.appendChild(title);

        const qText = document.createElement("p");
        qText.textContent = q.q;
        qText.style.fontSize = "16px";
        qText.style.marginBottom = "20px";
        qText.style.color = "var(--text)";
        card.appendChild(qText);

        const progress = document.createElement("div");
        progress.className = "progress";
        const pBar = document.createElement("div");
        pBar.className = "progress-bar";
        pBar.style.width = ((qIndex + 1) / t.quiz.length) * 100 + "%";
        progress.appendChild(pBar);
        card.appendChild(progress);

        // Cover toggle: answers start hidden so you recall first, then reveal.
        const coverLabel = document.createElement("label");
        coverLabel.className = "cover-toggle";
        const coverInput = document.createElement("input");
        coverInput.type = "checkbox";
        coverInput.checked = true;
        coverLabel.appendChild(coverInput);
        coverLabel.appendChild(
          document.createTextNode(
            "Answers hidden. Uncheck to reveal and answer",
          ),
        );
        card.appendChild(coverLabel);

        const shell = document.createElement("div");
        shell.className = "opt-shell covered";

        const optDiv = document.createElement("div");
        optDiv.className = "option-group opt-list";
        q.o.forEach((opt, i) => {
          const label = document.createElement("label");
          const input = document.createElement("input");
          input.type = multi ? "checkbox" : "radio";
          input.name = "ans";
          input.value = i;
          // Always start cleared: no selection carries over to a new screen.
          input.checked = false;
          label.appendChild(input);
          label.appendChild(document.createTextNode(opt));
          optDiv.appendChild(label);
        });
        shell.appendChild(optDiv);

        const veil = document.createElement("div");
        veil.className = "cover-veil";
        veil.textContent =
          "Recall the answer first, then uncheck the box above to reveal the options.";
        shell.appendChild(veil);
        card.appendChild(shell);

        const btnDiv = document.createElement("div");
        btnDiv.className = "button-row";

        const submitBtn = document.createElement("button");
        submitBtn.className = "btn btn-primary";
        submitBtn.textContent = "Submit";
        submitBtn.disabled = true;
        submitBtn.onclick = () => submitQ(q);
        btnDiv.appendChild(submitBtn);

        // Checked = covered (cannot answer). Unchecking reveals and enables submit.
        coverInput.onchange = () => {
          const covered = coverInput.checked;
          shell.classList.toggle("covered", covered);
          submitBtn.disabled = covered;
          coverLabel.lastChild.textContent = covered
            ? "Answers hidden. Uncheck to reveal and answer"
            : "Answers revealed. Re-check to hide them again";
          if (covered) {
            // Clear any selection when the answers are covered again.
            optDiv
              .querySelectorAll('input[name="ans"]')
              .forEach((inp) => (inp.checked = false));
          }
        };

        const skipBtn = document.createElement("button");
        skipBtn.className = "btn btn-secondary";
        skipBtn.textContent = "Skip";
        skipBtn.onclick = () => {
          results[qIndex] = "skipped";
          currentQ++;
          showQuiz();
        };
        btnDiv.appendChild(skipBtn);

        card.appendChild(btnDiv);
        content.appendChild(card);
      }

      function showLongQuestion(q, qIndex, t) {
        const content = document.getElementById("contentContainer");
        content.innerHTML = "";

        const card = document.createElement("div");
        card.className = "card";

        const badge = document.createElement("span");
        badge.className = "qtype multi";
        badge.textContent = "Exam-style longer answer (15 marks)";
        card.appendChild(badge);

        const title = document.createElement("h2");
        title.textContent = "Question " + (qIndex + 1) + " of " + t.quiz.length;
        card.appendChild(title);

        const progress = document.createElement("div");
        progress.className = "progress";
        const pBar = document.createElement("div");
        pBar.className = "progress-bar";
        pBar.style.width = ((qIndex + 1) / t.quiz.length) * 100 + "%";
        progress.appendChild(pBar);
        card.appendChild(progress);

        const scenario = document.createElement("div");
        scenario.className = "scenario";
        scenario.innerHTML =
          '<div class="scenario-prompt">Scenario</div><div class="scenario-text">' +
          q.q +
          "</div>";
        card.appendChild(scenario);

        const shells = [];
        q.parts.forEach((p) => {
          const partDiv = document.createElement("div");
          partDiv.className = "la-part";

          const prompt = document.createElement("div");
          prompt.className = "la-prompt";
          prompt.innerHTML =
            "<strong>" +
            p.label +
            "</strong> " +
            p.prompt +
            ' <span class="la-marks">[' +
            p.marks +
            "]</span>";
          partDiv.appendChild(prompt);

          const shell = document.createElement("div");
          shell.className = "opt-shell covered";
          const ans = document.createElement("div");
          ans.className = "opt-list la-answer";
          ans.innerHTML = p.answer;
          shell.appendChild(ans);
          const veil = document.createElement("div");
          veil.className = "cover-veil";
          veil.style.cursor = "pointer";
          veil.textContent =
            "Draft your own answer first, then click to reveal the model answer.";
          veil.onclick = () => shell.classList.remove("covered");
          shell.appendChild(veil);
          partDiv.appendChild(shell);
          shells.push(shell);

          card.appendChild(partDiv);
        });

        const btnDiv = document.createElement("div");
        btnDiv.className = "button-row";

        const revealBtn = document.createElement("button");
        revealBtn.className = "btn btn-secondary";
        revealBtn.textContent = "Reveal all model answers";
        revealBtn.onclick = () =>
          shells.forEach((s) => s.classList.remove("covered"));
        btnDiv.appendChild(revealBtn);

        const finishBtn = document.createElement("button");
        finishBtn.className = "btn btn-primary";
        finishBtn.textContent =
          qIndex + 1 >= t.quiz.length ? "See Results" : "Next";
        finishBtn.onclick = () => {
          results[qIndex] = "reviewed";
          currentQ++;
          showQuiz();
        };
        btnDiv.appendChild(finishBtn);

        card.appendChild(btnDiv);
        content.appendChild(card);
      }

      function submitQ(q) {
        const checkedInputs = [
          ...document.querySelectorAll('input[name="ans"]:checked'),
        ];
        if (checkedInputs.length === 0) {
          alert("Pick at least one answer");
          return;
        }

        const chosen = checkedInputs.map((c) => parseInt(c.value)).sort();
        const correct = correctSet(q).sort();
        const isRight =
          chosen.length === correct.length &&
          chosen.every((v, i) => v === correct[i]);

        results[currentQ] = isRight ? "correct" : "incorrect";

        const coverToggle = document.querySelector(".cover-toggle input");
        if (coverToggle) coverToggle.disabled = true;

        const labels = [...document.querySelectorAll(".option-group label")];
        labels.forEach((l) => l.classList.add("locked"));
        chosen.forEach((i) => {
          labels[i].classList.add(
            correct.includes(i) ? "correct" : "incorrect",
          );
        });
        // Reveal any correct answers the user missed.
        correct.forEach((i) => labels[i].classList.add("correct"));

        const correctText = correct.map((i) => q.o[i]).join("; ");
        const feedback = document.createElement("div");
        feedback.className =
          "feedback show " + (isRight ? "correct" : "incorrect");
        feedback.innerHTML =
          (isRight ? "Correct." : "Incorrect.") +
          " Correct answer" +
          (correct.length > 1 ? "s" : "") +
          ": <strong>" +
          correctText +
          "</strong>" +
          (q.e ? '<span class="explain">' + q.e + "</span>" : "");
        document.querySelector(".button-row").replaceWith(feedback);

        const nextBtn = document.createElement("button");
        nextBtn.className = "btn btn-primary";
        nextBtn.style.marginTop = "16px";
        nextBtn.textContent =
          currentQ + 1 >= TOPICS[currentTopic].quiz.length
            ? "See Results"
            : "Next";
        nextBtn.onclick = () => {
          currentQ++;
          showQuiz();
        };
        feedback.parentNode.appendChild(nextBtn);
      }

      function showResults() {
        const t = TOPICS[currentTopic];
        const total = t.quiz.length;
        const correct = results.filter((r) => r === "correct").length;
        const incorrect = results.filter((r) => r === "incorrect").length;
        const skipped = results.filter((r) => r === "skipped").length;
        const attempted = correct + incorrect;
        const pct = attempted > 0 ? Math.round((correct / attempted) * 100) : 0;

        const content = document.getElementById("contentContainer");
        content.innerHTML = "";

        const card = document.createElement("div");
        card.className = "card results";
        card.innerHTML =
          '<div class="results-score">' +
          pct +
          "%</div>" +
          '<div class="results-text">You answered ' +
          correct +
          " of " +
          attempted +
          " attempted questions correctly (" +
          total +
          " total).</div>" +
          '<div class="stat-box"><div class="stat-icon correct">' +
          correct +
          '</div><div><div class="stat-label">Correct</div></div></div>' +
          '<div class="stat-box"><div class="stat-icon incorrect">' +
          incorrect +
          '</div><div><div class="stat-label">Incorrect</div></div></div>' +
          '<div class="stat-box"><div class="stat-icon skipped">' +
          skipped +
          '</div><div><div class="stat-label">Skipped</div></div></div>';

        const btnRow = document.createElement("div");
        btnRow.className = "button-row";
        btnRow.style.justifyContent = "center";

        const retryBtn = document.createElement("button");
        retryBtn.className = "btn btn-primary";
        retryBtn.textContent = "Retake Quiz";
        retryBtn.onclick = () => startQuiz();
        btnRow.appendChild(retryBtn);

        const reviewBtn = document.createElement("button");
        reviewBtn.className = "btn btn-secondary";
        reviewBtn.textContent = "Back to Notes";
        reviewBtn.onclick = () => renderContent();
        btnRow.appendChild(reviewBtn);

        card.appendChild(btnRow);
        content.appendChild(card);
      }

      renderTabs();
      renderContent();
    </script>
  </body>
</html>
